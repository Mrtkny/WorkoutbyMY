<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>GA Dispatch Tool</title>

<style>

body{
font-family:Arial;
background:#0c1116;
color:white;
text-align:center;
padding:40px;
}

input{
padding:10px;
font-size:18px;
margin:5px;
text-transform:uppercase;
}

button{
padding:10px;
font-size:16px;
background:#1abc9c;
border:none;
border-radius:6px;
color:white;
margin:5px;
cursor:pointer;
}

#result{
margin-top:30px;
font-size:18px;
line-height:1.6;
}

</style>

</head>

<body>

<script>

let password = prompt("Enter password")

if(password !== "falcon8x"){

document.body.innerHTML = "<h1 style='margin-top:200px'>Access Denied</h1>"

while(true){}

}

</script>

<h1>GA Dispatch Tool</h1>

<input list="icaoList" id="icao" placeholder="ICAO">

<datalist id="icaoList"></datalist>

<br>

<button onclick="searchAirport()">SEARCH</button>

<div id="result"></div>

<script>

let airports = {}

fetch("airports.csv")
.then(res => res.text())
.then(text => {

let rows = text.split(/\r?\n/)

rows.slice(1).forEach(row => {

let cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)

let ident = cols[1]
let type = cols[2]
let name = cols[3]
let lat = cols[4]
let lon = cols[5]
let country = cols[8]
let iata = cols[13]

if(!ident) return

ident = ident.replace(/"/g,"")

// sadece gerçek ICAO
if(ident.length !== 4) return
if(type === '"heliport"') return
if(type === '"seaplane_base"') return

airports[ident] = {

name: name.replace(/"/g,""),
country: country.replace(/"/g,""),
lat: lat,
lon: lon,
iata: iata ? iata.replace(/"/g,"") : "",
private_notes: "Private permit info not entered yet",
commercial_notes: "Commercial permit info not entered yet"

}

let option=document.createElement("option")
option.value=ident

document.getElementById("icaoList").appendChild(option)

})

})

function getLocalTime(){

let now=new Date()

let hours=now.getHours().toString().padStart(2,'0')
let minutes=now.getMinutes().toString().padStart(2,'0')

let offset=-now.getTimezoneOffset()/60
let sign=offset>=0?"+":""

return hours+":"+minutes+" (UTC"+sign+offset+")"

}

function searchAirport(){

let code=document.getElementById("icao").value.toUpperCase()

let airport=airports[code]

if(!airport){

document.getElementById("result").innerHTML="Airport not found"
return

}

let html=""

html+="<h2>"+code+" - "+airport.name+"</h2>"

html+="Country: "+airport.country+"<br>"
html+="Coordinates: "+airport.lat+" , "+airport.lon+"<br>"

html+="<br><b>Local Time</b><br>"+getLocalTime()

html+="<br><br><b>Permit</b><br>"

html+='<button onclick="showPrivate(\''+code+'\')">Private</button>'
html+='<button onclick="showCommercial(\''+code+'\')">Commercial</button>'

document.getElementById("result").innerHTML=html

}

function showPrivate(code){

let airport = airports[code]

alert(airport.private_notes)

}

function showCommercial(code){

let airport = airports[code]

alert(airport.commercial_notes)

}

document.getElementById("icao").addEventListener("keypress", function(event){

if(event.key === "Enter"){
searchAirport()
}

})

document.getElementById("icao").addEventListener("change", function(){

searchAirport()

})

</script>

</body>

</html>
