<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>GA Dispatch Tool</title>

<style>

body{
font-family:Arial;
background:#0c1116;
color:white;
text-align:center;
padding:40px;
}

#loginBox{
margin-top:200px;
}

input{
padding:10px;
font-size:18px;
margin:5px;
}

button{
padding:10px;
font-size:16px;
background:#1abc9c;
border:none;
border-radius:6px;
color:white;
margin:5px;
cursor:pointer;
}

#app{
display:none;
}

#result{
margin-top:30px;
font-size:18px;
line-height:1.6;
}

</style>

</head>

<body>

<div id="loginBox">

<h2>Login</h2>

<input type="password" id="passwordInput" placeholder="Password">

<br>

<button onclick="checkPassword()">Enter</button>

<p id="loginMsg"></p>

</div>

<div id="app">

<h1>GA Dispatch Tool</h1>

<input list="icaoList" id="icao" placeholder="ICAO">

<datalist id="icaoList"></datalist>

<br>

<button onclick="searchAirport()">SEARCH</button>

<div id="result"></div>

</div>

<script>

let airports = {}

function checkPassword(){

let pass = document.getElementById("passwordInput").value

if(pass === "falcon8x"){

document.getElementById("loginBox").style.display="none"
document.getElementById("app").style.display="block"

loadAirports()

}
else{

document.getElementById("loginMsg").innerHTML="Wrong password"

}

}

function loadAirports(){

fetch("airports.csv")
.then(res => res.text())
.then(text => {

let rows = text.split(/\r?\n/)

rows.slice(1).forEach(row => {

let cols = row.replace(/"/g,"").split(",")

let ident = cols[1]
let type = cols[2]
let name = cols[3]
let lat = cols[4]
let lon = cols[5]
let country = cols[8]
let iata = cols[13]

if(!ident) return
if(ident.length !== 4) return
if(type === "heliport") return
if(type === "seaplane_base") return

airports[ident] = {

name: name,
country: country,
lat: lat,
lon: lon,
iata: iata

}

let option=document.createElement("option")
option.value=ident

document.getElementById("icaoList").appendChild(option)

})

})

}

function getLocalTime(){

let now=new Date()

let hours=now.getHours().toString().padStart(2,'0')
let minutes=now.getMinutes().toString().padStart(2,'0')

let offset=-now.getTimezoneOffset()/60
let sign=offset>=0?"+":""

return hours+":"+minutes+" (UTC"+sign+offset+")"

}

function searchAirport(){

let code=document.getElementById("icao").value.toUpperCase()

let airport=airports[code]

if(!airport){

document.getElementById("result").innerHTML="Airport not found"
return

}

let html=""

html+="<h2>"+code+" - "+airport.name+" ("+airport.iata+")</h2>"

html+="Country: "+airport.country+"<br>"
html+="Coordinates: "+airport.lat+" , "+airport.lon+"<br>"

html+="<br><b>Local Time</b><br>"+getLocalTime()

html+="<br><br><b>Permit</b><br>"

html+='<button onclick="alert(\'Private permit notes not entered\')">Private</button>'
html+='<button onclick="alert(\'Commercial permit notes not entered\')">Commercial</button>'

document.getElementById("result").innerHTML=html

}

document.getElementById("icao").addEventListener("keypress", function(event){

if(event.key === "Enter"){
searchAirport()
}

})

</script>

</body>

</html>
