<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>GA Dispatch Tool</title>

<style>

body{
font-family:Arial;
background:#0c1116;
color:white;
text-align:center;
padding:40px;
}

input{
padding:10px;
font-size:18px;
margin:5px;
text-transform:uppercase;
}

button{
padding:10px;
font-size:18px;
background:#1abc9c;
border:none;
border-radius:6px;
color:white;
}

#result{
margin-top:30px;
font-size:18px;
line-height:1.6;
}

</style>

</head>

<body>

<script>

let password = prompt("Enter password")

if(password !== "setair"){

document.body.innerHTML = "<h1>Access denied</h1>"
throw new Error("Access denied")

}

</script>

<h1>GA Dispatch Tool</h1>

<input list="icaoList" id="icao" placeholder="ICAO">

<datalist id="icaoList"></datalist>

<br>

<button onclick="searchAirport()">SEARCH</button>

<div id="result"></div>

<script>

let airports={}
let ops={}

fetch("airports.json")
.then(res=>res.json())
.then(data=>{

airports=data

let list=document.getElementById("icaoList")

Object.keys(data).forEach(code=>{

let option=document.createElement("option")

option.value=code

list.appendChild(option)

})

})

fetch("ops.json")
.then(res=>res.json())
.then(data=>{

ops=data

})

function getLocalTime(){

let now=new Date()

let hours=now.getHours().toString().padStart(2,'0')
let minutes=now.getMinutes().toString().padStart(2,'0')

let offset=-now.getTimezoneOffset()/60
let sign=offset>=0?"+":""

return hours+":"+minutes+" (UTC"+sign+offset+")"

}

function searchAirport(){

let code=document.getElementById("icao").value.toUpperCase()

let airport=airports[code]
let op=ops[code]

if(!airport){

document.getElementById("result").innerHTML="Airport not found"
return

}

let html=""

html+="<h2>"+code+" - "+airport.name+"</h2>"

html+="Country: "+airport.country+"<br>"
html+="Coordinates: "+airport.lat+" , "+airport.lon+"<br>"

html+="<br><b>Local Time</b><br>"+getLocalTime()

html+="<br><br><b>Runways</b><br>"+airport.runways

html+="<br><br><b>Permit</b><br>"
html+='<input type="checkbox"> Commercial<br>'
html+='<input type="checkbox"> Private<br>'

if(op){

html+="<br><br><b>FBO</b><br>"+op.fbo
html+="<br><b>Handling</b><br>"+op.handling
html+="<br><b>Fuel</b><br>"+op.fuel
html+="<br><b>Phone</b><br>"+op.phone
html+="<br><b>Notes</b><br>"+op.notes

}

document.getElementById("result").innerHTML=html

}

document.getElementById("icao").addEventListener("keypress", function(event){

if(event.key === "Enter"){
searchAirport()
}

})

document.getElementById("icao").addEventListener("change", function(){

searchAirport()

})

</script>

</body>

</html>
