<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>GA Dispatch Tool</title>

<style>

body{
font-family:Arial;
background:#0c1116;
color:white;
text-align:center;
padding:40px;
}

input,select{
padding:10px;
font-size:18px;
margin:5px;
}

button{
padding:10px;
font-size:18px;
background:#1abc9c;
border:none;
border-radius:6px;
color:white;
}

#result{
margin-top:30px;
font-size:18px;
line-height:1.6;
}

</style>

</head>

<body>

<h1>GA Dispatch Tool</h1>

<select id="aircraft">
<option>Falcon 8X</option>
<option>Falcon 6X</option>
</select>

<br>

<input id="icao" placeholder="ICAO">

<button onclick="searchAirport()">SEARCH</button>

<div id="result"></div>

<script>

const airports = {

"LTFM":{

name:"Istanbul Airport",

elevation:"325 ft",

runways:[
"17L/35R – 4100 m",
"17R/35L – 4100 m"
],

ops:{
fbo:"IGA Business Aviation",
handling:"IGA Handling",
fuel:"Jet A1"
},

notes:"Slots required / GA parking limited"

},

"LTFJ":{

name:"Sabiha Gokcen",

elevation:"312 ft",

runways:[
"06/24 – 3000 m"
],

ops:{
fbo:"Celebi",
handling:"Celebi",
fuel:"Jet A1"
},

notes:"Busy GA traffic"

}

}

function searchAirport(){

let code=document.getElementById("icao").value.toUpperCase()

let aircraft=document.getElementById("aircraft").value

let a=airports[code]

if(a){

let runways=a.runways.join("<br>")

document.getElementById("result").innerHTML=

"<h2>"+code+" – "+a.name+"</h2>"+

"<b>Aircraft:</b> "+aircraft+"<br>"+

"<br><b>Elevation</b><br>"+a.elevation+

"<br><br><b>Runways</b><br>"+runways+

"<br><br><b>FBO</b><br>"+a.ops.fbo+

"<br><b>Handling</b><br>"+a.ops.handling+

"<br><b>Fuel</b><br>"+a.ops.fuel+

"<br><br><b>Ops Notes</b><br>"+a.notes

}

else{

document.getElementById("result").innerHTML="Airport not in database"

}

}

</script>

</body>

</html>
