<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>GA Dispatch Tool</title>

<style>

body{
font-family:Arial;
background:#0c1116;
color:white;
text-align:center;
padding:40px;
}

input{
padding:10px;
font-size:18px;
margin:5px;
text-transform:uppercase;
}

button{
padding:10px;
font-size:16px;
background:#1abc9c;
border:none;
border-radius:6px;
color:white;
margin:5px;
cursor:pointer;
}

#result{
margin-top:30px;
font-size:18px;
line-height:1.6;
}

</style>

</head>

<body>

<script>

let password = prompt("Enter password")

if(password !== "falcon8x"){

document.body.innerHTML = "<h1>Access denied</h1>"
throw new Error("Access denied")

}

</script>

<h1>GA Dispatch Tool</h1>

<input list="icaoList" id="icao" placeholder="ICAO">

<datalist id="icaoList"></datalist>

<br>

<button onclick="searchAirport()">SEARCH</button>

<div id="result"></div>

<script>

let airports = {}

fetch("airports.csv")
.then(res => res.text())
.then(data => {

let rows = data.split("\n")

rows.slice(1).forEach(row => {

let cols = row.replace(/"/g,"").split(",")

let ident = cols[1]
let type = cols[2]
let name = cols[3]
let lat = cols[4]
let lon = cols[5]
let country = cols[8]
let iata = cols[13]

// sadece gerçek ICAO havalimanları
if(!ident) return
if(ident.length !== 4) return
if(type === "heliport") return
if(type === "seaplane_base") return

airports[ident] = {

name: name,
country: country,
lat: lat,
lon: lon,
iata: iata

}

let option=document.createElement("option")
option.value=ident

document.getElementById("icaoList").appendChild(option)

})

})

function searchAirport(){

let code=document.getElementById("icao").value.toUpperCase()

let airport=airports[code]

if(!airport){

document.getElementById("result").innerHTML="Airport not found"
return

}

let html=""

html+="<h2>"+code+" - "+airport.name+"</h2>"

html+="Country: "+airport.country+"<br>"
html+="Coordinates: "+airport.lat+" , "+airport.lon+"<br>"

document.getElementById("result").innerHTML=html

}

document.getElementById("icao").addEventListener("keypress", function(event){

if(event.key === "Enter"){
searchAirport()
}

})

document.getElementById("icao").addEventListener("change", function(){

searchAirport()

})

</script>

</body>

</html>
