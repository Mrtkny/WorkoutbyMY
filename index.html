<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Airport Database</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:40px;
}

input{
padding:12px;
font-size:18px;
text-transform:uppercase;
}

button{
padding:12px;
font-size:18px;
margin-left:10px;
background:#27ae60;
border:none;
border-radius:6px;
color:white;
}

#result{
margin-top:30px;
font-size:20px;
}

</style>

</head>

<body>

<h1>Airport Database</h1>

<input id="icao" placeholder="ICAO kodu">

<button onclick="searchAirport()">Ara</button>

<div id="result"></div>

<script>

const airports = {

"LTBA":{
name:"Istanbul Ataturk Airport",
city:"Istanbul",
runway:"3000 m",
freq:"Tower 118.1"
},

"LTFM":{
name:"Istanbul Airport",
city:"Istanbul",
runway:"4100 m",
freq:"Tower 118.6"
},

"LTAI":{
name:"Antalya Airport",
city:"Antalya",
runway:"3400 m",
freq:"Tower 118.7"
}

}

function searchAirport(){

let code=document.getElementById("icao").value.toUpperCase()

let airport=airports[code]

if(airport){

document.getElementById("result").innerHTML=

"<b>"+airport.name+"</b><br>"+
"City: "+airport.city+"<br>"+
"Runway: "+airport.runway+"<br>"+
"Frequency: "+airport.freq

}

else{

document.getElementById("result").innerHTML="Airport bulunamadı"

}

}

</script>

</body>

</html>
